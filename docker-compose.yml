services:
  ollama:
    image: ollama/ollama:latest
    container_name: jarvis-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  jarvis:
    build: .
    container_name: jarvis-core
    ports:
      - "${APP_PORT:-8000}:${APP_PORT:-8000}"
    env_file:
      - .env
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    volumes:
      - jarvis_data:/app/data
    depends_on:
      - ollama
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: jarvis-ui
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:${APP_PORT:-8000}
      - REACT_APP_WS_URL=ws://localhost:${APP_PORT:-8000}/ws
    depends_on:
      - jarvis
    restart: unless-stopped

volumes:
  ollama_data:
  jarvis_data:
